{% extends "boutique/base.html" %}

{% block title %}{{ product.name }} – Petal &amp; Bloom{% endblock %}

{% block content %}
<div class="product-detail">
    <h2>{{ product.name }}</h2>
    <p class="price">{{ product.price }}</p>
    <p class="description">{{ product.description }}</p>
    <p class="arranged-by">🌿 Arranged by: <strong>TBD</strong></p>
    <a class="back-link" href="{% url 'boutique:home' %}">&larr; Back to All Arrangements</a>
</div>
{% endblock %}
